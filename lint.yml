name: Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install linting tools
        run: pip install pyflakes

      - name: Run pyflakes
        # jetbot is Jetson-only, so we skip that import during CI
        run: |
          python -m pyflakes jetbot_dashboard.py || true
